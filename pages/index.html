<body>
  <div id="__bundler_thumbnail">
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect width="100" height="100" fill="#0a0b08"></rect><rect x="30" y="28" width="40" height="44" rx="8" fill="#0b0e08" stroke="#2a3324"></rect><rect x="42" y="40" width="16" height="10" rx="2" fill="#74c866"></rect><rect x="42" y="54" width="16" height="6" rx="2" fill="#74c866"></rect></svg>
</div>
  <div id="__bundler_loading">Unpacking...</div>

  <script>

document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // The generated page swaps out the loader document, so restore the public
    // metadata and publishing-specific responsive rules after that swap.
    document.title = 'Chimlo - macOS activity island for coding agents';
    const publicMetadata = [
      ['name', 'description', 'Chimlo keeps Codex and Claude Code visible in your MacBook notch, with local session activity, questions, approvals, and usage at a glance.'],
      ['name', 'theme-color', '#0a0b08'],
      ['property', 'og:type', 'website'],
      ['property', 'og:site_name', 'Chimlo'],
      ['property', 'og:title', 'Chimlo - macOS activity island for coding agents'],
      ['property', 'og:description', 'Keep Codex and Claude Code visible in your MacBook notch. Answer questions, approve actions, and check usage without leaving your flow.'],
      ['property', 'og:url', 'https://kraten.github.io/chimlo/'],
      ['property', 'og:image', 'https://kraten.github.io/chimlo/assets/social-preview.png'],
      ['property', 'og:image:width', '1774'],
      ['property', 'og:image:height', '887'],
      ['property', 'og:image:alt', 'Chimlo activity island for coding agents'],
      ['name', 'twitter:card', 'summary_large_image']
    ];
    for (const [attribute, key, content] of publicMetadata) {
      const meta = document.createElement('meta');
      meta.setAttribute(attribute, key);
      meta.content = content;
      document.head.appendChild(meta);
    }
    const canonical = document.createElement('link');
    canonical.rel = 'canonical';
    canonical.href = 'https://kraten.github.io/chimlo/';
    document.head.appendChild(canonical);
    const favicon = document.createElement('link');
    favicon.rel = 'icon';
    favicon.href = './assets/chimlo-icon.png';
    document.head.appendChild(favicon);
    const publishingStyles = document.createElement('style');
    publishingStyles.textContent = `
      @keyframes chFade {
        from { transform: translateY(5px); }
        to { transform: translateY(0); }
      }
      @media (max-width: 720px) {
        header nav > div,
        header nav > span[style*="width:1px"] { display: none !important; }
      }
      @media (max-width: 520px) {
        header nav { gap: 12px !important; padding: 13px 18px !important; }
      }
      @media (prefers-reduced-motion: reduce) {
        [style*="animation:chBob"],
        [style*="animation:chCaret"],
        [style*="animation:chFade"] { animation: none !important; }
      }
    `;
    document.head.appendChild(publishingStyles);
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-height:1.6;\"><span style=\"color:var(--green);\">Chimlo:<\u002Fspan> All 93 checks passed. <span style=\"color:var(--green);\">Ready to ship ✓<\u002Fspan><\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ isQuestion }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"background:#0d110a; border:1px solid oklch(0.5 0.13 55 / 0.4); border-radius:10px; padding:11px 12px; animation:chFade .4s ease both;\">\n                        <div style=\"font-family:'JetBrains Mono'; font-size:9.5px; color:var(--claude); letter-spacing:0.08em; margin-bottom:8px;\">CHIMLO ASKS<\u002Fdiv>\n                        <div style=\"font-size:12px; color:#eaf0e2; margin-bottom:9px;\">Ship to production now?<\u002Fdiv>\n                        <div style=\"display:flex; gap:7px;\">\n                          <div style=\"flex:1; font-size:11px; color:#f2e6d6; padding:7px 9px; background:oklch(0.75 0.15 55 / 0.14); border:1px solid oklch(0.5 0.13 55 / 0.45); border-radius:7px; display:flex; align-items:center; gap:6px;\"><kbd style=\"font-family:'JetBrains Mono'; font-size:9px; color:var(--claude); border:1px solid oklch(0.5 0.13 55 / 0.5); border-radius:4px; padding:1px 4px;\">⌘1<\u002Fkbd> Ship now<\u002Fdiv>\n                          <div style=\"flex:1; font-size:11px; color:#dfe6d5; padding:7px 9px; background:#151a12; border:1px solid var(--line2); border-radius:7px; display:flex; align-items:center; gap:6px;\"><kbd style=\"font-family:'JetBrains Mono'; font-size:9px; color:var(--muted); border:1px solid var(--line2); border-radius:4px; padding:1px 4px;\">⌘2<\u002Fkbd> Hold<\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                    <sc-if value=\"{{ isApproval }}\" hint-placeholder-val=\"{{ false }}\">\n                      <div style=\"background:#0d110a; border:1px solid oklch(0.5 0.13 55 / 0.4); border-radius:10px; padding:11px 12px; animation:chFade .4s ease both;\">\n                        <div style=\"font-family:'JetBrains Mono'; font-size:9.5px; color:var(--claude); letter-spacing:0.08em; margin-bottom:8px;\">⚠ PERMISSION REQUEST<\u002Fdiv>\n                        <div style=\"font-size:12px; color:#eaf0e2; margin-bottom:10px;\">Run <code style=\"font-family:'JetBrains Mono'; font-size:11px; color:var(--claude); background:var(--panel); padding:1px 5px; border-radius:4px;\">git push origin main<\u002Fcode><\u002Fdiv>\n                        <div style=\"display:flex; gap:7px;\">\n                          <div style=\"flex:1; text-align:center; font-size:11px; color:var(--muted); padding:7px; border:1px solid var(--line2); border-radius:7px;\">Deny <kbd style=\"font-family:'JetBrains Mono'; font-size:9px;\">⌘N<\u002Fkbd><\u002Fdiv>\n                          <div style=\"flex:1; text-align:center; font-size:11px; font-weight:600; color:#08130a; padding:7px; background:var(--green); border-radius:7px;\">Allow <kbd style=\"font-family:'JetBrains Mono'; font-size:9px;\">⌘Y<\u002Fkbd><\u002Fdiv>\n                        <\u002Fdiv>\n                      <\u002Fdiv>\n                    <\u002Fsc-if>\n                <\u002Fdiv>\n              <\u002Fsc-if>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <div style=\"display:flex; justify-content:center; gap:9px; margin-top:18px;\">\n          <sc-for list=\"{{ dots }}\" as=\"d\" hint-placeholder-count=\"4\">\n            <button sc-camel-on-click=\"{{ d.go }}\" title=\"{{ d.label }}\" style=\"width:8px; height:8px; padding:0; border:none; cursor:pointer; border-radius:50%; background:{{ d.color }};\"><\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- RUNS WITH -->\n  <section style=\"max-width:1080px; margin:0 auto; padding:0 24px;\">\n    <div style=\"border-top:1px solid var(--line); border-bottom:1px solid var(--line); padding:26px 0; display:flex; flex-wrap:wrap; align-items:center; gap:20px 28px;\">\n      <span style=\"font-family:'JetBrains Mono'; font-size:11px; letter-spacing:0.16em; color:var(--dim); white-space:nowrap;\">WORKS WITH THE AGENTS YOU ALREADY RUN<\u002Fspan>\n      <span style=\"flex:1;\"><\u002Fspan>\n      <div style=\"display:flex; flex-wrap:wrap; gap:12px;\">\n        <div style=\"display:flex; align-items:center; gap:11px; padding:10px 16px 10px 12px; border:1px solid var(--line2); border-radius:11px; background:var(--bg2);\">\n          <span style=\"width:26px; height:26px; border-radius:7px; display:grid; place-items:center; background:oklch(0.68 0.15 250 / 0.16); color:var(--codex); font-size:12px;\">◆<\u002Fspan>\n          <div style=\"display:flex; flex-direction:column; line-height:1.2;\">\n            <span style=\"font-size:14px; font-weight:600; color:var(--ink);\">Codex<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono'; font-size:10px; color:var(--dim);\">OpenAI<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:11px; padding:10px 16px 10px 12px; border:1px solid var(--line2); border-radius:11px; background:var(--bg2);\">\n          <span style=\"width:26px; height:26px; border-radius:7px; display:grid; place-items:center; background:oklch(0.75 0.15 55 / 0.16); color:var(--claude); font-size:13px;\">✳<\u002Fspan>\n          <div style=\"display:flex; flex-direction:column; line-height:1.2;\">\n            <span style=\"font-size:14px; font-weight:600; color:var(--ink);\">Claude Code<\u002Fspan>\n            <span style=\"font-family:'JetBrains Mono'; font-size:10px; color:var(--dim);\">Anthropic<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:9px; padding:10px 16px; border:1px dashed var(--line2); border-radius:11px;\">\n          <span style=\"font-family:'JetBrains Mono'; font-size:12px; color:var(--muted);\">more soon<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FEATURES -->\n  <section id=\"features\" style=\"max-width:1080px; margin:0 auto; padding:100px 24px;\">\n    <div style=\"max-width:620px; margin-bottom:48px;\">\n      <div style=\"font-family:'JetBrains Mono'; font-size:12px; letter-spacing:0.16em; color:var(--green); margin-bottom:18px;\">FEATURES<\u002Fdiv>\n      <h2 style=\"font-weight:700; font-size:clamp(30px,4.2vw,48px); line-height:1.04; letter-spacing:-0.025em; margin:0 0 16px;\">Everything happening. One glance.<\u002Fh2>\n      <p style=\"color:var(--muted); font-size:16px; line-height:1.6; margin:0;\">Long-running agents shouldn't make you babysit a terminal. Chimlo keeps the work visible and brings the moments that need you to where you already are.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- showcase -->\n    <div style=\"border:1px solid var(--line2); border-radius:20px; background:var(--bg2); padding:clamp(28px,4vw,46px); display:flex; flex-wrap:wrap; gap:44px; align-items:center; margin-bottom:8px;\">\n      <div style=\"flex:1 1 320px; min-width:280px;\">\n        <div style=\"font-family:'JetBrains Mono'; font-size:11px; letter-spacing:0.14em; color:var(--green); margin-bottom:14px;\">THE DIFFERENCE<\u002Fdiv>\n        <h3 style=\"font-weight:700; font-size:clamp(24px,3vw,32px); line-height:1.1; letter-spacing:-0.02em; margin:0 0 14px;\">Answer and approve without leaving your editor.<\u002Fh3>\n        <p style=\"color:var(--muted); font-size:15px; line-height:1.65; margin:0 0 16px;\">When an agent needs a decision — a question to answer or an action to approve — the island opens right where you're looking. Reply, allow it once, or allow it for the whole session.<\u002Fp>\n        <p style=\"font-family:'JetBrains Mono'; font-size:12.5px; color:var(--dim); margin:0;\">Nothing runs until you say so.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 300px; min-width:260px; background:var(--panel); border:1px solid var(--line2); border-radius:14px; padding:18px;\">\n        <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:15px;\">\n          <div>{{ companionAsk }}<\u002Fdiv>\n          <div>\n            <div style=\"font-size:13.5px; font-weight:600; color:#eef3e8;\">Review the release build<\u002Fdiv>\n            <div style=\"font-family:'JetBrains Mono'; font-size:10px; color:var(--dim);\">Claude · waiting for you<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-family:'JetBrains Mono'; font-size:9.5px; color:var(--claude); letter-spacing:0.08em; margin-bottom:9px;\">CHIMLO ASKS<\u002Fdiv>\n        <div style=\"font-size:14px; color:#eaf0e2; margin-bottom:13px;\">Ship to production now?<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:8px;\">\n          <div style=\"display:flex; align-items:center; gap:10px; font-size:13px; color:#f2e6d6; padding:10px 12px; background:oklch(0.75 0.15 55 / 0.14); border:1px solid oklch(0.5 0.13 55 / 0.45); border-radius:9px;\"><kbd style=\"font-family:'JetBrains Mono'; font-size:10px; color:var(--claude); border:1px solid oklch(0.5 0.13 55 / 0.5); border-radius:4px; padding:1px 5px;\">⌘1<\u002Fkbd> Ship it now<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px; font-size:13px; color:#dfe6d5; padding:10px 12px; background:var(--bg); border:1px solid var(--line2); border-radius:9px;\"><kbd style=\"font-family:'JetBrains Mono'; font-size:10px; color:var(--muted); border:1px solid var(--line2); border-radius:4px; padding:1px 5px;\">⌘2<\u002Fkbd> Hold for review<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- index list -->\n    <div style=\"display:grid; grid-template-columns:repeat(auto-fit, minmax(330px, 1fr)); column-gap:52px;\">\n      <sc-for list=\"{{ features }}\" as=\"f\" hint-placeholder-count=\"8\">\n        <div style=\"display:flex; gap:20px; padding:26px 0; border-top:1px solid var(--line);\">\n          <span style=\"font-family:'JetBrains Mono'; font-size:13px; color:var(--green); flex-shrink:0; padding-top:3px;\">{{ f.n }}<\u002Fspan>\n          <div>\n            <h3 style=\"font-weight:600; font-size:18px; letter-spacing:-0.01em; margin:0 0 7px; color:var(--ink);\">{{ f.title }}<\u002Fh3>\n            <p style=\"font-size:14px; line-height:1.6; color:var(--muted); margin:0;\">{{ f.body }}<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- PRIVACY -->\n  <section style=\"border-top:1px solid var(--line);\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:100px 24px; display:flex; flex-wrap:wrap; gap:56px; align-items:flex-start;\">\n      <div style=\"flex:1 1 420px; min-width:300px;\">\n        <div style=\"font-family:'JetBrains Mono'; font-size:12px; letter-spacing:0.16em; color:var(--green); margin-bottom:18px;\">PRIVATE BY DEFAULT<\u002Fdiv>\n        <h2 style=\"font-weight:800; font-size:clamp(32px,4.8vw,56px); line-height:1.0; letter-spacing:-0.03em; margin:0;\">Everything stays<br>on your Mac.<\u002Fh2>\n      <\u002Fdiv>\n      <div style=\"flex:1 1 340px; min-width:280px;\">\n        <p style=\"color:var(--muted); font-size:16px; line-height:1.65; margin:0 0 24px;\">Chimlo just gives your terminal a face at the top of the screen. What your agents say and do stays between you and them.<\u002Fp>\n        <div style=\"display:flex; flex-direction:column; gap:16px;\">\n          <sc-for list=\"{{ privacy }}\" as=\"p\" hint-placeholder-count=\"4\">\n            <div style=\"display:flex; gap:13px; align-items:flex-start; border-top:1px solid var(--line); padding-top:16px;\">\n              <span style=\"color:var(--green); font-size:13px; margin-top:2px;\">✓<\u002Fspan>\n              <span style=\"font-size:14.5px; line-height:1.55; color:#d6dece;\">{{ p }}<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INSTALL -->\n  <section id=\"install\" style=\"border-top:1px solid var(--line);\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:100px 24px; text-align:center;\">\n      <div style=\"font-family:'JetBrains Mono'; font-size:12px; letter-spacing:0.16em; color:var(--green); margin-bottom:18px;\">INSTALL<\u002Fdiv>\n      <h2 style=\"font-weight:700; font-size:clamp(30px,4.2vw,48px); line-height:1.04; letter-spacing:-0.025em; margin:0 0 16px;\">Running in a minute.<\u002Fh2>\n      <p style=\"color:var(--muted); font-size:16px; line-height:1.6; max-width:480px; margin:0 auto 32px;\">Download the signed app and drag it to Applications. It updates itself — no accounts, no setup.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:22px; justify-content:center; align-items:center;\">\n        <a href=\"https://github.com/kraten/chimlo/releases/latest\" target=\"_blank\" rel=\"noopener\" style=\"display:inline-flex; align-items:center; gap:10px; padding:15px 24px; background:var(--green); color:#08130a; border-radius:10px; font-weight:600; font-size:15px;\" style-hover=\"background:oklch(0.9 0.16 145);\">\n          <svg width=\"16\" height=\"16\" sc-camel-view-box=\"0 0 24 24\" fill=\"#08130a\" aria-hidden=\"true\"><path d=\"M12 3v10.6l3.3-3.3 1.4 1.4L12 17.4 6.3 11.7l1.4-1.4L11 13.6V3zM5 19h14v2H5z\"><\u002Fpath><\u002Fsvg>\n          Download Chimlo.dmg\n        <\u002Fa>\n        <a href=\"https://github.com/kraten/chimlo\" target=\"_blank\" rel=\"noopener\" style=\"font-size:15px; font-weight:500; color:var(--ink); border-bottom:1px solid var(--line2); padding-bottom:2px;\" style-hover=\"border-color:var(--green); color:var(--green);\">Build from source ↗<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"font-family:'JetBrains Mono'; font-size:12px; color:var(--dim); margin:26px 0 0;\">macOS 14+ · Apple Silicon · GPL-3.0<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FAQ -->\n  <section id=\"faq\" style=\"border-top:1px solid var(--line);\">\n    <div style=\"max-width:820px; margin:0 auto; padding:100px 24px;\">\n      <div style=\"margin-bottom:40px;\">\n        <div style=\"font-family:'JetBrains Mono'; font-size:12px; letter-spacing:0.16em; color:var(--green); margin-bottom:18px;\">FAQ<\u002Fdiv>\n        <h2 style=\"font-weight:700; font-size:clamp(30px,4.2vw,44px); letter-spacing:-0.025em; margin:0;\">Questions, answered.<\u002Fh2>\n      <\u002Fdiv>\n      <div>\n        <sc-for list=\"{{ faqs }}\" as=\"q\" hint-placeholder-count=\"6\">\n          <div style=\"border-top:1px solid var(--line);\">\n            <button sc-camel-on-click=\"{{ q.toggle }}\" style=\"width:100%; text-align:left; background:none; border:none; cursor:pointer; padding:22px 0; display:flex; align-items:center; gap:16px; color:var(--ink); font-family:'Space Grotesk'; font-size:16px; font-weight:500;\">\n              <span style=\"flex:1;\">{{ q.q }}<\u002Fspan>\n              <span style=\"color:var(--green); font-size:20px; font-family:'JetBrains Mono';\">{{ q.sign }}<\u002Fspan>\n            <\u002Fbutton>\n            <sc-if value=\"{{ q.open }}\" hint-placeholder-val=\"{{ false }}\">\n              <div style=\"padding:0 40px 24px 0; font-size:14.5px; line-height:1.7; color:var(--muted);\">{{ q.a }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"border-top:1px solid var(--line);\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:92px 24px 104px; text-align:center;\">\n      <div style=\"display:flex; justify-content:center; margin-bottom:26px;\"><div style=\"animation:chBob 2.4s ease-in-out infinite;\">{{ companionHero }}<\u002Fdiv><\u002Fdiv>\n      <h2 style=\"font-weight:800; font-size:clamp(34px,5.2vw,62px); line-height:1.0; letter-spacing:-0.03em; margin:0 0 16px;\">Get back to your flow.<\u002Fh2>\n      <p style=\"color:var(--muted); font-size:16px; line-height:1.6; max-width:440px; margin:0 auto 32px;\">Free and open source, forever. Star it, run it, and let your agents keep working.<\u002Fp>\n      <div style=\"display:flex; flex-wrap:wrap; gap:20px; justify-content:center; align-items:center;\">\n        <a href=\"https://github.com/kraten/chimlo/releases/latest\" target=\"_blank\" rel=\"noopener\" style=\"padding:15px 26px; background:var(--green); color:#08130a; border-radius:10px; font-weight:600; font-size:15px;\" style-hover=\"background:oklch(0.9 0.16 145);\">Download for Mac<\u002Fa>\n        <a href=\"https://github.com/kraten/chimlo\" target=\"_blank\" rel=\"noopener\" style=\"font-size:15px; font-weight:500; color:var(--ink); border-bottom:1px solid var(--line2); padding-bottom:2px;\" style-hover=\"border-color:var(--green); color:var(--green);\">Star on GitHub ↗<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"border-top:1px solid var(--line); background:var(--bg2);\">\n    <div style=\"max-width:1080px; margin:0 auto; padding:40px 24px; display:flex; flex-wrap:wrap; gap:24px; align-items:center;\">\n      <div style=\"display:flex; align-items:center; gap:11px;\">\n        <img src=\"d8626a50-e7ab-4aa7-bd27-2c18daeba85e\" alt=\"Chimlo\" width=\"44\" height=\"44\" style=\"border-radius:11px; display:block;\">\n        <div style=\"display:flex; flex-direction:column;\">\n          <span style=\"font-family:'Bricolage Grotesque'; font-weight:700; font-size:16px;\">Chimlo<\u002Fspan>\n          <span style=\"font-size:11.5px; color:var(--dim);\">macOS activity island for coding agents<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <span style=\"flex:1;\"><\u002Fspan>\n      <div style=\"display:flex; flex-wrap:wrap; gap:22px; font-size:13.5px;\">\n        <a href=\"https://github.com/kraten/chimlo\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--muted);\">GitHub<\u002Fa>\n        <a href=\"https://github.com/kraten/chimlo/discussions\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--muted);\">Discussions<\u002Fa>\n        <a href=\"https://github.com/kraten/chimlo/blob/main/Docs/ARCHITECTURE.md\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--muted);\">Architecture<\u002Fa>\n        <a href=\"https://github.com/kraten/chimlo/blob/main/LICENSE\" target=\"_blank\" rel=\"noopener\" style=\"color:var(--muted);\">GPL-3.0<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1080px; margin:0 auto; padding:0 24px 34px; font-family:'JetBrains Mono'; font-size:11px; color:var(--dim);\">© 2026 Chimlo · Built by <a href=\"https://github.com/kraten\" target=\"_blank\" rel=\"noopener\">kraten<\u002Fa> · Product and integration names belong to their respective owners.<\u002Fdiv>\n  <\u002Ffooter>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1080,&quot;height&quot;:900},&quot;autoDemo&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Demo&quot;},&quot;demoSpeed&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:3.6,&quot;min&quot;:2,&quot;max&quot;:8,&quot;step&quot;:0.2,&quot;unit&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Demo&quot;}}\">\nclass Component extends DCLogic {\n  state = { scene: 0, openFaq: 0 };\n\n  componentDidMount() { this._start(); }\n  componentWillUnmount() { clearInterval(this._t); }\n\n  _start() {\n    clearInterval(this._t);\n    const auto = this.props.autoDemo ?? true;\n    if (!auto) return;\n    const ms = Math.max(1500, (this.props.demoSpeed ?? 3.6) * 1000);\n    this._t = setInterval(() => {\n      this.setState(s => ({ scene: (s.scene + 1) % 4 }));\n    }, ms);\n  }\n\n  _pixel(scale, body, eye) {\n    const P = [\n      \"....WWWW....\",\n      \"..WWBBBBWW..\",\n      \".WBBBBBBBBW.\",\n      \".WBVVVVVVBW.\",\n      \".WVEEVVEEVW.\",\n      \".WVVVVVVVVW.\",\n      \"WWBBBBBBBBWW\",\n      \"W.BBBBBBBB.W\",\n      \"..BBBBBBBB..\",\n      \"..BBBBBBBB..\",\n      \"..WBBBBBBW..\",\n      \"...WW..WW...\",\n      \"...WW..WW...\"\n    ];\n    const map = { W: \"#f3f6ee\", B: body, V: \"#0b0e08\", E: eye };\n    const sh = [];\n    P.forEach((row, r) => {\n      row.split(\"\").forEach((ch, c) => {\n        if (ch === \".\" || ch === \" \") return;\n        sh.push(`${c * scale}px ${r * scale}px 0 0 ${map[ch]}`);\n      });\n    });\n    return React.createElement(\"div\", {\n      style: { position: \"relative\", width: P[0].length * scale + \"px\", height: P.length * scale + \"px\", imageRendering: \"pixelated\" }\n    }, React.createElement(\"div\", {\n      style: { position: \"absolute\", top: 0, left: 0, width: scale + \"px\", height: scale + \"px\", boxShadow: sh.join(\",\") }\n    }));\n  }\n\n  _green(scale) { return this._pixel(scale, \"#74c866\", \"#c6f2b6\"); }\n  _orange(scale) { return this._pixel(scale, \"#ef9a52\", \"#ffd9ad\"); }\n\n  renderVals() {\n    const s = this.state.scene;\n    const set = (i) => () => { clearInterval(this._t); this.setState({ scene: i }); };\n\n    const CODEX = \"var(--codex)\", CLAUDE = \"var(--claude)\";\n    const codexBg = \"oklch(0.68 0.15 250 / 0.16)\", claudeBg = \"oklch(0.75 0.15 55 / 0.16)\";\n    const sessions = [\n      { title: \"Trace the webhook timeout\", you: \"Can you verify the release build?\", agent: \"Codex\", model: \"5.6 Sol\", time: \"<1m\", color: CODEX, badge: codexBg, comp: this._green(2), active: true },\n      { title: \"Review the release build\", you: \"Please check the build and tests.\", agent: \"Claude\", model: \"Opus 4.8\", time: \"41m\", color: CLAUDE, badge: claudeBg, comp: this._orange(2), active: false },\n      { title: \"Polish the first-run tour\", you: \"Smooth out the onboarding flow.\", agent: \"Codex\", model: \"5.6 Sol\", time: \"58m\", color: CODEX, badge: codexBg, comp: this._green(2), active: false },\n      { title: \"README refresh complete\", you: \"Update the docs and examples.\", agent: \"Codex\", model: \"5.6 Sol\", time: \"2h\", color: CODEX, badge: codexBg, comp: this._green(2), active: false }\n    ];\n\n    const dotColors = [\"var(--codex)\", \"var(--green)\", \"var(--claude)\", \"var(--claude)\"];\n    const dotLabels = [\"Working\", \"Done\", \"Question\", \"Approval\"];\n    const dots = [0, 1, 2, 3].map((i) => ({\n      go: set(i), label: dotLabels[i], color: i === s ? dotColors[i] : \"var(--line2)\"\n    }));\n\n    const features = [\n      { n: \"01\", title: \"Every session in one place\", body: \"See what Codex and Claude Code are up to — working, waiting, or done — without hunting through terminal tabs.\" },\n      { n: \"02\", title: \"Usage at a glance\", body: \"Your remaining Codex and Claude capacity, right in the island. It updates on its own.\" },\n      { n: \"03\", title: \"Jump to the right terminal\", body: \"Click a session and land on its exact tab and pane — iTerm2, Ghostty, WezTerm and more.\" },\n      { n: \"04\", title: \"Native and featherlight\", body: \"A real Mac app, not Electron. Under 100 MB of RAM, and it never steals focus.\" },\n      { n: \"05\", title: \"A useful notch between tasks\", body: \"When nothing's running, it handles media, volume and brightness on the same little surface.\" },\n      { n: \"06\", title: \"Pixel companions\", body: \"Little characters make idle, working, waiting, done and failed states obvious at a glance.\" }\n    ];\n\n    const privacy = [\n      \"No cloud, no accounts, no sign-in — ever.\",\n      \"Your prompts and transcripts never leave your Mac.\",\n      \"The terminal stays in charge: a timeout never counts as a yes.\"\n    ];\n\n    const faqData = [\n      { q: \"Is Chimlo really free?\", a: \"Yes — free and open source under GPL-3.0. No subscriptions, no license keys, nothing locked away.\" },\n      { q: \"Which agents does it work with?\", a: \"Codex and Claude Code, running side by side in one island. It's open source, so more can follow.\" },\n      { q: \"Can I answer and approve without switching to the terminal?\", a: \"Yes. When an agent asks a question or needs permission, the island opens with the choices right there. Pick one and it goes straight back to the session.\" },\n      { q: \"Does my data leave my Mac?\", a: \"No. Chimlo talks to your tools locally. Nothing is sent to a server, and there's no telemetry.\" },\n      { q: \"Does it work without a notch?\", a: \"Yes. On notched Macs it lives in the notch; on everything else it's a small floating bar at the top of the screen.\" },\n      { q: \"How do I install it?\", a: \"Download the signed .dmg and drag it to Applications — it updates itself. Want to build it yourself? Everything's on GitHub.\" }\n    ];\n    const faqs = faqData.map((f, i) => ({\n      q: f.q, a: f.a,\n      open: this.state.openFaq === i,\n      sign: this.state.openFaq === i ? \"–\" : \"+\",\n      toggle: () => this.setState(st => ({ openFaq: st.openFaq === i ? -1 : i }))\n    }));\n\n    return {\n      scene: s,\n      isWorking: s === 0, isDone: s === 1, isQuestion: s === 2, isApproval: s === 3,\n      sessions,\n      companionAsk: this._orange(3),\n      companionHero: this._green(6),\n      dots, features, privacy, faqs\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
