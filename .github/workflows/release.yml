name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & Release
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: make test

      - name: Build app bundle
        run: make app

      - name: Create zip archive
        run: |
          cd dist
          zip -r Chimlo-${{ github.ref_name }}.zip Chimlo.app

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Chimlo-${{ github.ref_name }}.zip
          generate_release_notes: true
          draft: true
