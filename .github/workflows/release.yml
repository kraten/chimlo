name: Local release policy

on:
  workflow_dispatch:

permissions: {}

jobs:
  explain:
    name: Explain local-only releases
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Release policy
        run: |
          echo "Chimlo releases are built, code-signed, and Sparkle-signed locally."
          echo "GitHub Actions must not rebuild or re-sign public artifacts."
          echo "Use make release, then make release-publish from the trusted release Mac."
