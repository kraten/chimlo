name: Deploy website to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - pages/**
      - .github/workflows/pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Verify site entry point
        run: test -f pages/index.html

      - name: Assemble site
        run: |
          mkdir -p _site/assets
          cp pages/index.html _site/index.html
          cp pages/.nojekyll _site/.nojekyll
          cp .github/chimlo-icon.png _site/assets/chimlo-icon.png
          cp .github/social-preview.png _site/assets/social-preview.png

      - name: Upload site
        uses: actions/upload-pages-artifact@v4
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
