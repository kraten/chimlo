name: 🐛 Bug Report
description: Report a bug or unexpected behavior in Chimlo
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what happened.
      placeholder: Tell us what you observed...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. Launch Chimlo
        2. Connect Codex hooks
        3. Start a Codex session
        4. ...
    validations:
      required: true

  - type: dropdown
    id: macos-version
    attributes:
      label: macOS version
      options:
        - macOS 15 (Sequoia)
        - macOS 14 (Sonoma)
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: display-type
    attributes:
      label: Display type
      options:
        - Built-in (with notch)
        - Built-in (without notch)
        - External monitor
        - Multiple displays
    validations:
      required: true

  - type: checkboxes
    id: agent-providers
    attributes:
      label: Agent providers in use
      options:
        - label: Codex
        - label: Claude Code
        - label: Neither / other

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Built from source (make app)
        - Running from source (swift run)
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any error output, Console.app logs, or attach screenshots.
      render: text

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Anything else that might be relevant — Swift version, Xcode version, etc.
