name: 💡 Feature Request
description: Suggest a new feature or improvement for Chimlo
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for Chimlo? We'd love to hear it! Please describe the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? Is it related to a frustration?
      placeholder: I'm always frustrated when...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the feature or behavior you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered any alternative solutions or workarounds?

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      options:
        - Island UI / visuals
        - Agent integrations (Codex, Claude Code)
        - Session discovery / tracking
        - Approvals / decisions
        - Settings / configuration
        - CLI / developer tools
        - Accessibility
        - Other
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, mockups, links, or anything else that helps explain the request.
